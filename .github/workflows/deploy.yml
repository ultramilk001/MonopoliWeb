name: Deploy to GitHub Pagesname: Deploy to GitHub Pages

    on:
      push:
        branches: [ main ]

    permissions:
      contents: read
      pages: write
      id-token: write

    jobs:
      build-and-deploy:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v4
          
          - name: Set up Node.js
            uses: actions/setup-node@v4
            with:
              node-version: 20
              cache: 'npm'
              
          - name: Install Dependencies
            run: npm install
              
          - name: Build Project
            run: npm run build
              
          - name: Setup Pages
            uses: actions/configure-pages@v4
            
          - name: Upload artifact
            uses: actions/upload-pages-artifact@v3
            with:
              path: './dist'
              
          - name: Deploy to GitHub Pages
            id: deployment
            uses: actions/deploy-pages@v4
    ```
  
  
    Simpan perubahan tersebut (*Commit changes*). Sekarang, buka kembali tab **Actions**.
    Anda akan melihat sebuah proses baru berjalan. Namanya tidak lagi *Deploy static content*, melainkan **Deploy to GitHub Pages**. Tunggu sekitar 1 hingga 2 menit sampai robot selesai melakukan *install* dan *build* hingga muncul centang hijau.

